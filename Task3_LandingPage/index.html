<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temperature Converter</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#00c6ff,#0072ff,#6a11cb,#2575fc);
background-size:400% 400%;

animation:bg 12s ease infinite;

overflow:hidden;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:420px;
padding:35px;
border-radius:25px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

box-shadow:0 20px 40px rgba(0,0,0,.25);

color:white;

text-align:center;

position:relative;

}

.weather{

font-size:55px;

margin-bottom:10px;

display:flex;

justify-content:center;

gap:20px;

}

.weather i:nth-child(1){

color:#FFD93D;

animation:spin 8s linear infinite;

}

.weather i:nth-child(2){

color:#9BE7FF;

}

.weather i:nth-child(3){

color:white;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

h1{

font-size:32px;

margin-bottom:8px;

}

p{

opacity:.9;

margin-bottom:25px;

}

.inputBox{

position:relative;

margin-bottom:20px;

}

.inputBox i{

position:absolute;

left:15px;

top:17px;

color:#0072ff;

font-size:18px;

}

input{

width:100%;

padding:15px 15px 15px 45px;

border:none;

outline:none;

border-radius:12px;

font-size:17px;

}

select{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:12px;

font-size:17px;

margin-bottom:20px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

font-size:20px;

font-weight:bold;

cursor:pointer;

color:white;

background:linear-gradient(90deg,#ff512f,#dd2476);

transition:.4s;

}

button:hover{

transform:translateY(-4px);

box-shadow:0 10px 20px rgba(0,0,0,.3);

}

.result{

margin-top:30px;

padding:20px;

background:rgba(255,255,255,.2);

border-radius:15px;

}

.result h2{

font-size:18px;

margin-bottom:10px;

}

.result h3{

font-size:40px;

color:#FFD93D;

}

.footer{

margin-top:20px;

font-size:13px;

opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<div class="weather">

<i class="fas fa-sun"></i>

<i class="fas fa-temperature-half"></i>

<i class="far fa-snowflake"></i>

</div>

<h1>Temperature Converter</h1>

<p>Convert Celsius, Fahrenheit & Kelvin Instantly</p>

<div class="inputBox">

<i class="fas fa-thermometer-half"></i>

<input
type="text"
id="temp"
placeholder="Enter Temperature">

</div>

<select id="unit">

<option value="C">Celsius (°C)</option>

<option value="F">Fahrenheit (°F)</option>

<option value="K">Kelvin (K)</option>

</select>

<button onclick="convert()">

<i class="fas fa-sync-alt"></i>

Convert

</button>

<div class="result">

<h2>Converted Temperature</h2>

<h3 id="answer">--</h3>

</div>

<div class="footer">

🌡️ Smart Temperature Converter

</div>

</div>

<script>

function convert(){

let temp=document.getElementById("temp").value;

let unit=document.getElementById("unit").value;

let ans=document.getElementById("answer");

if(temp==="" || isNaN(temp))
{
ans.innerHTML="Enter Valid Number";
return;
}

temp=parseFloat(temp);

let value;
let out;

if(unit=="C"){

value=(temp*9/5)+32;

out="°F";

}

else if(unit=="F"){

value=(temp-32)*5/9;

out="°C";

}

else{

value=temp-273.15;

out="°C";

}

ans.innerHTML=value.toFixed(2)+" "+out;

}

</script>

</body>
</html>
